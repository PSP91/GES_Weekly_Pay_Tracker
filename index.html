<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Payroll Tracker £</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --shadow: rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #ffffff;
                --shadow: rgba(0,0,0,0.5);
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            margin: 0;
            width: 100%;
            box-sizing: border-box;
        }

        h1 { 
            margin-bottom: 10px; 
            text-align: center;
        }

        .header-info {
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.2rem; /* Made larger again */
            font-weight: 500;
            color: var(--text-main);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin: 0 auto 15px auto;
            width: 95%;
            max-width: 450px;
            box-shadow: 0 4px 15px var(--shadow);
            position: relative;
            box-sizing: border-box;
            text-align: center; /* Centers all text inside the card */
        }

        .row { 
            margin: 10px 0; 
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .date-blue { color: #4a90e2; font-weight: bold; }
        .date-green { color: #4caf50; font-weight: bold; }
        .date-red { color: #e57373; font-weight: bold; }
        
        /* Positioned £ symbol slightly better for centered text */
        .emoji { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            font-size: 1.2rem;
            opacity: 0.6;
        }

        .holiday-note {
            background-color: #ff9800;
            color: white;
            font-size: 0.8rem;
            padding: 6px 12px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>£ Payroll Tracker £</h1>
    <div id="month-summary" class="header-info"></div>

    <div id="schedule-container" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        </div>

    <script>
        const bankHolidays = [
            "2026-01-01", "2026-04-03", "2026-04-06", "2026-05-04", 
            "2026-05-25", "2026-08-31", "2026-12-25", "2026-12-28"
        ];

        function formatDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}/${date.getFullYear()}`;
        }

        const container = document.getElementById('schedule-container');
        const summary = document.getElementById('month-summary');
        
        let today = new Date();
        let nextPayDay = new Date();
        nextPayDay.setDate(today.getDate() + (3 + 7 - today.getDay()) % 7);

        let paydaysThisMonth = 0;
        let testDate = new Date(today.getFullYear(), today.getMonth(), 1);
        while (testDate.getMonth() === today.getMonth()) {
            if (testDate.getDay() === 3) paydaysThisMonth++;
            testDate.setDate(testDate.getDate() + 1);
        }
        summary.innerText = `This month has ${paydaysThisMonth} paydays.`;

        for (let i = 0; i < 6; i++) {
            let payDate = new Date(nextPayDay);
            payDate.setDate(nextPayDay.getDate() + (i * 7));

            let slipDate = new Date(payDate);
            slipDate.setDate(payDate.getDate() - 2);

            let weekEnd = new Date(payDate);
            weekEnd.setDate(payDate.getDate() - 10);

            let weekStart = new Date(weekEnd);
            weekStart.setDate(weekEnd.getDate() - 6);

            let isHolidayWeek = false;
            let checkDate = new Date(weekStart);
            while(checkDate <= weekEnd) {
                if(bankHolidays.includes(checkDate.toISOString().split('T')[0])) {
                    isHolidayWeek = true;
                    break;
                }
                checkDate.setDate(checkDate.getDate() + 1);
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="emoji">£</span>
                <div class="row">Week Starting: <span class="date-blue">${formatDate(weekStart)}</span></div>
                <div class="row">Week Ending: <span class="date-green">${formatDate(weekEnd)}</span></div>
                <div class="row">Payslip: <span class="date-blue">${formatDate(slipDate)} (Mon)</span></div>
                <div class="row">Payday: <span class="date-red">${formatDate(payDate)} (Wed)</span></div>
                ${isHolidayWeek ? '<div class="holiday-note">📢 Bank Holiday Week - Check for Extra!</div>' : ''}
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
