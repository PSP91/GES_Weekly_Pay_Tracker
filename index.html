<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Tracker</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --shadow: rgba(0,0,0,0.1);
            --accent: #ffd700;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #ffffff;
                --shadow: rgba(0,0,0,0.5);
            }
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .header-box {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(74, 144, 226, 0.1);
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px var(--shadow);
            position: relative;
        }

        .holiday-note {
            background-color: #ff9800;
            color: white;
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            margin-top: 10px;
        }

        .row { margin: 8px 0; font-size: 1.1rem; }
        .date-blue { color: #4a90e2; font-weight: bold; }
        .date-green { color: #4caf50; font-weight: bold; }
        .date-red { color: #e57373; font-weight: bold; }
        .emoji { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; }
    </style>
</head>
<body>

    <h1>£ Payroll Tracker £</h1>
    
    <div id="monthly-stats" class="header-box">
        </div>

    <div id="schedule-container"></div>

    <script>
        // UK Bank Holidays 2026 (Format: YYYY-MM-DD)
        const bankHolidays = [
            "2026-01-01", "2026-04-03", "2026-04-06", "2026-05-04", 
            "2026-05-25", "2026-08-31", "2026-12-25", "2026-12-28"
        ];

        function formatDate(date) {
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}/${date.getFullYear()}`;
        }

        const container = document.getElementById('schedule-container');
        const statsContainer = document.getElementById('monthly-stats');
        
        let today = new Date();
        let nextPayDate = new Date();
        nextPayDate.setDate(today.getDate() + (3 + 7 - today.getDay()) % 7);

        // Calculate Paydays this month
        let currentMonth = today.getMonth();
        let paydaysThisMonth = 0;
        let tempDate = new Date(today.getFullYear(), currentMonth, 1);
        while (tempDate.getMonth() === currentMonth) {
            if (tempDate.getDay() === 3) paydaysThisMonth++;
            tempDate.setDate(tempDate.getDate() + 1);
        }

        const monthName = today.toLocaleString('default', { month: 'long' });
        statsContainer.innerHTML = `<strong>${monthName} Summary:</strong> There are <strong>${paydaysThisMonth}</strong> paydays this month.`;

        for (let i = 0; i < 6; i++) {
            let payDate = new Date(nextPayDate);
            payDate.setDate(nextPayDate.getDate() + (i * 7));

            let slipDate = new Date(payDate); slipDate.setDate(payDate.getDate() - 2);
            let endWeek = new Date(payDate); endWeek.setDate(payDate.getDate() - 10);
            let startWeek = new Date(endWeek); startWeek.setDate(endWeek.getDate() - 6);

            // Check if any day in the working week was a bank holiday
            let hasHoliday = false;
            let checkDate = new Date(startWeek);
            while(checkDate <= endWeek) {
                let iso = checkDate.toISOString().split('T')[0];
                if(bankHolidays.includes(iso)) { hasHoliday = true; break; }
                checkDate.setDate(checkDate.getDate() + 1);
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="emoji">£</span>
                <div class="row">Week Starting: <span class="date-blue">${formatDate(startWeek)}</span></div>
                <div class="row">Week Ending: <span class="date-green">${formatDate(endWeek)}</span></div>
                <div class="row">Payslip: <span class="date-blue">${formatDate(slipDate)} (Mon)</span></div>
                <div class="row">Payday: <span class="date-red">${formatDate(payDate)} (Wed)</span></div>
                ${hasHoliday ? '<div class="holiday-note">📢 Bank Holiday Week - Check for Extra Pay!</div>' : ''}
            `;
            container.appendChild(card);
        }
    </script>
</body>
</html>
